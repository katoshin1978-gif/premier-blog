search:
  max_results: 10
  max_context_words: 500
  max_quote_words: 100
topic:
  mode: rss
  rss_limit: 20
  rss_feeds:
  - https://feeds.bbci.co.uk/sport/football/premier-league/rss.xml
  - https://www.skysports.com/rss/12040
  - https://www.theguardian.com/football/premierleague/rss
  - https://www.90min.com/feed
  - https://www.espn.com/espn/rss/soccer/news
  - https://www.football-italia.net/feed
  - https://metro.co.uk/sport/football/feed/
  - https://www.theguardian.com/profile/fabrizio-romano/rss
  nitter_accounts:
  - FabrizioRomano
  - centredvils
  - indykalia
  man_united_boost: 2.5
  trending_limit: 10
  reddit_limit: 5
  fixed_themes:
  - Manchester United latest news
  - Premier League transfer news
  - Premier League match results
  - Premier League latest news
  - Premier League manager news
topic_transfers:
  # Twitter（Nitter）経由で移籍トレンドを取得するアカウント
  nitter_accounts:
  - FabrizioRomano
  - David_Ornstein
  - DiMarzio
  # 補完用 RSS（Nitter 失敗時）
  rss_feeds:
  - https://www.football-italia.net/feed
  - https://www.90min.com/feed
  - https://www.theguardian.com/football/transfers/rss
  exclude_man_united: true   # Man United 関連は main パイプラインに任せる
  limit: 10
  count: 2                   # 1回の実行で生成する移籍記事数

topic_europe:
  # Twitter（Nitter）経由で欧州トレンドを取得するアカウント
  nitter_accounts:
  - FabrizioRomano
  - DiMarzio
  # 欧州フットボール RSS
  rss_feeds:
  - https://www.football-italia.net/feed
  - https://www.espn.com/espn/rss/soccer/news
  - https://www.bundesliga.com/en/bundesliga/news.rss
  - https://www.90min.com/feed
  - https://www.kicker.de/news/fussball/bundesliga/rss.xml
  - https://www.gazzetta.it/dynamic-feed/rss/section/calcio.xml
  - https://www.lequipe.fr/rss/actu_rss_Football.xml
  - https://www.mundodeportivo.com/rss/futbol.xml
  limit: 15
  count: 2                   # 1回の実行で生成する欧州記事数

topic_worldcup:
  # Transfermarktから自動取得に失敗した場合のフォールバック（手動メンテ不要）
  players:
  - Bruno Fernandes
  - Kobbie Mainoo
  - Lisandro Martinez
  - Diogo Dalot
  - Mason Mount
  - Luke Shaw
  - Noussair Mazraoui
  - Manuel Ugarte
  - Patrick Dorgu
  - Bryan Mbeumo
  limit: 10
  count: 2                   # 1回の実行で生成するWC記事数（0で無効化）

illustration:
  enabled: true

article:
  language: ja
  min_sources: 3
  max_sources: 8
